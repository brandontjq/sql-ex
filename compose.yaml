services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: sqlex
      POSTGRES_USER: sqlex
      POSTGRES_PASSWORD: sqlex
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqlex -d sqlex"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
